{% extends 'core/base.html' %}
{% block content %}
<h4>🛠 Lỗi: <span class="text-danger">{{ error.name }}</span></h4>
<p>Chọn máy bị lỗi:</p>

<form method="post">
  {% csrf_token %}
  <div class="row g-2">
    {% for m in machines %}
    <div class="col-6 col-md-3">
      <label class="w-100">
        <input type="radio" name="machine_id" value="{{ m.id }}" class="d-none" required>
        <div class="card machine-btn text-center d-flex align-items-center justify-content-center border-2">
          {{ m.get_machine_type_display }} #{{ m.machine_no }}
        </div>
      </label>
    </div>
    {% empty %}
    <p>Chưa có máy nào trong cửa hàng.</p>
    {% endfor %}
  </div>

  <div class="mt-3">
    <label>Ghi chú thêm (tùy chọn):</label>
    <textarea name="note" class="form-control" rows="2"></textarea>
  </div>

  <div class="mt-3 d-flex gap-2">
    <a href="{% url 'report_error' %}" class="btn btn-secondary">← Quay lại</a>
    <button class="btn btn-danger flex-grow-1">✅ Gửi báo cáo</button>
  </div>
</form>

<style>
  input[type=radio]:checked + .card { border-color: #dc3545 !important; background: #ffe5e5; }
</style>
{% endblock %}
