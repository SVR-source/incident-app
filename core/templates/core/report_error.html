{% extends 'core/base.html' %}
{% block content %}
<div class="page-header">
    <a href="{% url 'home' %}" class="back-btn">←</a>
    <h4>🚨 Chọn loại sự cố</h4>
</div>

<div class="error-grid">
{% for e in errors %}
    <a href="{% url 'select_machine' e.id %}" class="error-card">
        <div class="icon">{{ e.icon }}</div>
        <div class="name">{{ e.name }}</div>
    </a>
{% empty %}
    <p>Chưa có loại lỗi nào.</p>
{% endfor %}
</div>
{% endblock %}
