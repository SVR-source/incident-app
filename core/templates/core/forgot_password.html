{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card shadow"><div class="card-body">
    <h4>🔑 Quên mật khẩu</h4>
    <p class="text-muted small">Nhập email tài khoản, chúng tôi sẽ gửi link reset mật khẩu.</p>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label>Email</label>
        <input type="email" name="email" class="form-control" required></div>
      <button class="btn btn-primary w-100">Gửi link reset</button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'login' %}" class="text-decoration-none small">← Quay lại đăng nhập</a>
    </div>
  </div></div>
</div></div>
{% endblock %}
