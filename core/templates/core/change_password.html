{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
  <div class="card shadow"><div class="card-body">
    <h4>🔑 Đổi mật khẩu</h4>
    {% if force %}
    <div class="alert alert-warning">
      ⚠️ Đây là lần đăng nhập đầu tiên. Vui lòng đổi mật khẩu mặc định <strong>123456</strong> sang mật khẩu mới.
    </div>
    {% endif %}
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label>Mật khẩu cũ</label>
        <input type="password" name="old_password" class="form-control" required></div>
      <div class="mb-3"><label>Mật khẩu mới (≥6 ký tự)</label>
        <input type="password" name="new_password1" class="form-control" required></div>
      <div class="mb-3"><label>Nhập lại mật khẩu mới</label>
        <input type="password" name="new_password2" class="form-control" required></div>
      <button class="btn btn-primary w-100">Đổi mật khẩu</button>
    </form>
  </div></div>
</div></div>
{% endblock %}
