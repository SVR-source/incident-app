{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card shadow"><div class="card-body">
    <h4>🔐 Đặt mật khẩu mới</h4>
    <p class="text-muted small">Tài khoản: <strong>{{ user_obj.username }}</strong></p>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label>Mật khẩu mới (≥6 ký tự)</label>
        <input type="password" name="new_password1" class="form-control" required></div>
      <div class="mb-3"><label>Nhập lại mật khẩu mới</label>
        <input type="password" name="new_password2" class="form-control" required></div>
      <button class="btn btn-success w-100">Lưu mật khẩu mới</button>
    </form>
  </div></div>
</div></div>
{% endblock %}
