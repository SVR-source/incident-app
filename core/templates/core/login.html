{% extends 'core/base.html' %}
{% block content %}
<div style="min-height: calc(100vh - 100px); display: flex; align-items: center;">
<div class="w-100">
    <div class="text-center mb-4">
        <div style="font-size:4rem">🧺</div>
        <h3 class="fw-bold mt-2">Incident Manager</h3>
        <p class="text-muted small">Đăng nhập để tiếp tục</p>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <form method="post">{% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold">👤 Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">🔒 Mật khẩu</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button class="btn btn-primary btn-lg w-100">Đăng nhập</button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'forgot_password' %}" class="small text-decoration-none">🔑 Quên mật khẩu?</a>
            </div>
        </div>
    </div>

    <div class="alert alert-info mt-3 small">
        💡 Lần đầu đăng nhập: mật khẩu mặc định <strong>123456</strong>
    </div>
</div>
</div>
{% endblock %}
